
<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#333333" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#glow)"/>
  
  <!-- Subtle Car Silhouette / Lines -->
  <path d="M 100 500 Q 300 300 600 250 Q 900 300 1100 500" fill="none" stroke="#222" stroke-width="2"/>
  <path d="M 200 550 Q 400 350 600 350 Q 800 350 1000 550" fill="none" stroke="#333" stroke-width="1"/>
  
  <!-- Headlights -->
  <rect x="250" y="380" width="150" height="5" fill="#ff0000" opacity="0.8"/>
  <rect x="800" y="380" width="150" height="5" fill="#ff0000" opacity="0.8"/>
  
  <!-- Text -->
  <text x="600" y="200" font-family="Arial" font-size="60" fill="#ffffff" font-weight="bold" text-anchor="middle" letter-spacing="5">MODEL X PLAID</text>
  <text x="600" y="250" font-family="Arial" font-size="20" fill="#666666" text-anchor="middle" letter-spacing="2">WARRANTY ANALYSIS 2026</text>
</svg>
